// Arenas server config — disables standard CS round-win economy/scoring.
// Arenas drive round ends themselves (TerminateRoundIfPossible picks the winner),
// so team money/score/rounds must not matter. Shipped to csgo/cfg/arenas/arenas.cfg
// and exec'd on every map load by ServerConfigModule (also applied directly via ConVars).
mp_maxmoney 0
mp_teamcashawards 0
mp_playercashawards 0
mp_maxrounds 0
mp_autoteambalance 0
mp_halftime 0
mp_join_grace_time 0
mp_respawn_immunitytime 0
mp_warmuptime 0
mp_ct_default_primary ""
mp_ct_default_secondary ""
mp_t_default_primary ""
mp_t_default_secondary ""
mp_free_armor 0
mp_equipment_reset_rounds 0
mp_round_restart_delay 2
mp_freezetime 3

echo [Arenas] Config loaded!
